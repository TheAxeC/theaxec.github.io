profiles:

  # ===========================================================================
  # ANALYST  -- Senior Data Analyst, Guerrilla Games (Amsterdam)
  # ===========================================================================
  analyst:
    titles:
      - Data Scientist & Quantitative Analyst
      - Behavioural & Telemetry Analytics
      - SQL | Python | Experimentation

    summary:
      title: Profile
      text: |
        Quantitative scientist (PhD) with 8 years turning large, noisy behavioural and sensor
        datasets into decisions that non-technical teams act on. I design experiments, build
        analysis pipelines in Python and SQL, and translate ambiguous questions into well-scoped,
        reproducible analyses. Equally comfortable defining success metrics with stakeholders and
        digging into raw event streams to check whether the data can even answer the question.
        Long-time gamer and former game-dev competitor (2nd place, Belgian Game Development
        Championship) who wants to put rigorous analytics behind the moment-to-moment player
        experience.
      text_compact: |
        Quantitative scientist (PhD) with 8 years turning large, noisy behavioural and sensor
        datasets into decisions non-technical teams can act on. I design experiments, build
        analysis pipelines in Python and SQL, and turn ambiguous questions into well-scoped,
        reproducible analyses. Long-time gamer and former game-dev competitor (2nd place, Belgian
        Game Development Championship) who wants rigorous analytics behind the player experience.

    skills:
      title: Skills
      content:
        - category: Querying & Data
          items: "Advanced SQL on large event / time-series datasets; data modelling and event-taxonomy design; data-quality and completeness validation; aggregation, window functions and joins at scale."
        - category: Programming
          items: "Python (pandas, NumPy, scikit-learn), Jupyter; R; Git / version control; reproducible analysis workflows."
        - category: Experimentation & Statistics
          items: "A/B testing and experimental design; hypothesis testing; regression and survival models; Bayesian and spatial modelling; causal / observational analysis."
        - category: Machine Learning
          items: "Pragmatic ML for prediction and clustering; deep learning (PyTorch); tensor methods; representation / foundation models."
        - category: Visualisation & Communication
          items: "Tableau; matplotlib / Plotly; dashboards; presenting actionable insight to designers, producers, engineers and executives."
        - category: Domains
          items: "Behavioural and sensor telemetry; high-density time-series; instrumentation; product and player analytics."
          compact: false   # one-pager: folded into the profile line

    experience:
      title: Experience
      content:
        - title: "Postdoctoral Researcher - AI & Data Science"
          location: University of Twente / Medisch Spectrum Twente
          duration: Jan 2026 - Present
          about: |
            Build predictive models over large, longitudinal multi-modal datasets (imaging, molecular, clinical), owning the full pipeline from raw data to validated insight.
            Design explainable analytics that connect model outputs to the outcomes stakeholders care about, communicated to non-technical decision-makers.
        - title: "Scientific Coordinator & Machine-Learning Lead - Real-World Evidence"
          location: UHasselt (Flanders AI Research Program)
          duration: Jan 2024 - Jan 2026
          about: |
            Led a ~10-person, 4-institution analytics programme; converted open-ended objectives into concrete, measurable KPIs and well-scoped analyses for diverse stakeholders.
            Built distributed / federated analytics pipelines over heterogeneous, messy real-world datasets; owned data-quality, completeness and reliability checks across sites.
            Designed experiments and statistical evaluations; delivered findings as clear, actionable recommendations to partners, clinicians and funders.
            Mentored junior researchers and students; set analytical roadmaps and reproducibility standards (Git, notebooks).
          about_compact: |
            Led a ~10-person, 4-institution analytics programme; converted open-ended objectives into measurable KPIs and well-scoped analyses, designing the experiments and statistical evaluations to answer them.
            Built distributed / federated pipelines over heterogeneous real-world data; owned data quality across sites and delivered findings as clear recommendations.
            Mentored junior researchers; set reproducibility standards (Git, notebooks).
        - title: "Researcher - Behavioural Signal Decoding (Brain-Computer Interfaces)"
          location: KU Leuven
          duration: 2018 - 2024
          about: |
            Analysed high-density behavioural and neural time-series (millions of events per session) to detect patterns and predict actions, using SQL-style querying and aggregation over large event streams.
            Designed and validated instrumentation and event pipelines for real-time behavioural data; monitored signal quality end-to-end.
            Translated complex quantitative results into intuitive visual stories for cross-disciplinary audiences.
          about_compact: |
            Analysed high-density behavioural time-series (millions of events per session) to detect patterns and predict actions, using SQL-style querying and aggregation over large event streams.
            Designed and validated event pipelines and instrumentation; monitored data quality end-to-end and presented results visually to cross-disciplinary audiences.
        - title: "Data Science Consultant"
          location: Flanders BCI
          duration: 2022 - 2024
          about: |
            Delivered analytics consultancy for external partners: experiment design, signal detection / classification, and pragmatic ML modelling on behavioural sensor data.

    projects:
      title: Selected Projects
      content:
