    summary:
      title: Profile
      text: |
        Systems and C++ engineer at heart. I designed and maintain Cardinal, a C++20 virtual
        machine and runtime with its own bytecode compiler, fiber-based concurrency and a clean
        embedding API. Alongside that, eight years of research have meant writing performant,
        GPU-accelerated, multithreaded code over very large datasets, and profiling it to hit real
        runtime and memory targets. Trained as a computer-science engineer (ir.) with a
        compiler / programming-languages focus (ACM SIGPLAN and ICFP research-competition medals)
        and a former game-dev competitor (2nd place, Belgian Game Development Championship). I care
        about robust, profiled, maintainable low-level code, and I want to build engines full-time.
      text_compact: |
        Systems and C++ engineer: author of Cardinal, a C++20 virtual machine and runtime (bytecode
        compiler, fiber concurrency, embedding API), plus eight years writing performant,
        GPU-accelerated, multithreaded code over very large datasets. Computer-science engineer
        (ir.) with a compiler / PL focus (ACM SIGPLAN and ICFP medals) and a former game-dev
        competitor (2nd place, Belgian Game Development Championship). I want to build engines.

