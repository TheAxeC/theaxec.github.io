    letter:
      recipient_name: "Guerrilla Games - Analytics Team"
      recipient_address: "Amsterdam, The Netherlands"
      date: "June 2026"
      title: "Application - Senior Data Analyst"
      opening: "Dear Hiring Team,"
      closing: "Kind regards,"
      body: |
        I'm applying for the Senior Data Analyst role on Guerrilla's analytics team. I've spent
        my career making large, noisy behavioural datasets answer questions that people without a
        statistics background can act on -- and I'd love to do that for the moment-to-moment
        experience of games I actually play. As a long-time player, and a former game-dev
        competitor whose team took second at the Belgian Game Development Championship, I keep
        catching myself asking the analyst's question: how would you even measure whether a combat
        encounter's pacing works, or whether players are quietly running dry on a resource?

        Turning a vague design intuition into a well-scoped, measurable analysis is exactly what I
        do. Coordinating a four-institution research programme, I converted open-ended objectives
        into concrete KPIs, designed the experiments to test them, and delivered the findings as
        clear recommendations to a mix of designers, engineers and decision-makers. I'm fluent in
        SQL over large event-style datasets, build my analysis in Python and Jupyter, work in Git,
        and care a great deal about reproducibility and A/B-test discipline -- your preferred
        qualifications read like my toolbox.

        Much of my work has been gameplay-analytics-shaped without the game: high-density
        behavioural and sensor telemetry, millions of events per session, where half the battle is
        designing the instrumentation and validating that the data is complete and trustworthy
        before anyone draws a conclusion. Owning telemetry and event taxonomy, and guarding data
        quality, is familiar territory for me.

        At a senior level I try to do more than answer the questions I'm handed: I look for the
        analytical opportunities a team hasn't spotted yet, and I enjoy mentoring junior analysts
        toward rigorous, reproducible work. I'm based in the Netherlands and an EU citizen, so
        joining the Amsterdam studio is straightforward. I'd welcome the chance to talk about how I
        could help Guerrilla understand its players more deeply.

