# Description #
###############

description:
  title: dr. ir. Axel Faes
  biography: |
    Axel Faes is a postdoctoral researcher in AI for healthcare, specializing in interpretable, self-explaining AI and privacy-preserving federated learning for precision medicine. At the University of Twente (Cognition, Data and Education), he develops self-supervised imaging backbones and interpretable models integrating longitudinal MRI, multi-omics, and clinical data for early hepatocellular carcinoma detection within the AI-HCC ZonMw project.
    Previously at Hasselt University's Biomedical Data Sciences group, he served as technical machine learning lead and scientific coordinator of the Flanders AI Research Program's Real World Evidence use case, advancing cardiovascular disease prediction and population health management through federated learning. He holds M.Sc. degrees in Computer Science Engineering and Artificial Intelligence from KU Leuven, where he also completed a PhD in Biomedical Sciences on finger movement decoding using tensor regression modeling.
    His research builds toward **the self-explaining hospital**: interpretable, self-explaining models and **privacy-preserving federated learning that travels between institutions**, grounded in **multiway (block-term tensor) methods**. That methodological core began in computational neuroscience and brain-computer interfaces, and now drives multi-modal precision oncology and trustworthy clinical decision support.
  portrait_url: assets/images/photos/axel.jpg

research:
  title: Research Diary
  content: |
    Welcome to my research corner, where I advance `AI for precision medicine`. Here, you'll find projects, insights, and innovations in `self-explaining models`, `federated learning`, and `interpretable AI` applied to real-world healthcare challenges - from hepatocellular carcinoma detection and cardiovascular risk prediction to the neural decoding where my block-term tensor methods began. Join me as I translate trustworthy AI methods into clinical impact.

