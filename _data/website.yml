# Description #
###############

description:
  title: dr. ir. Axel Faes
  subtitle: "#LeadingAIinHealth"
  biography: |
    Axel Faes is a postdoctoral researcher in AI for healthcare, specializing in interpretable, self-explaining AI and privacy-preserving federated learning for precision medicine. At the University of Twente (Cognition, Data and Education), he develops self-supervised imaging backbones and interpretable models integrating longitudinal MRI, multi-omics, and clinical data for early hepatocellular carcinoma detection within the AI-HCC ZonMw project.
    Previously at Hasselt University's Biomedical Data Sciences group, he served as technical machine learning lead and scientific coordinator of the Flanders AI Research Program's Real World Evidence use case, advancing cardiovascular disease prediction and population health management through federated learning. He holds M.Sc. degrees in Computer Science Engineering and Artificial Intelligence from KU Leuven, where he also completed a PhD in Biomedical Sciences on finger movement decoding using tensor regression modeling.
    His research builds toward **the self-explaining hospital**: interpretable, self-explaining models and **privacy-preserving federated learning that travels between institutions**, grounded in **multiway (block-term tensor) methods**. That methodological core began in computational neuroscience and brain-computer interfaces, and now drives multi-modal precision oncology and trustworthy clinical decision support.

  positions:
    - name: 'Postdoctoral Researcher'
      url: 'https://www.utwente.nl/en/bms/code/'
      image: 'assets/images/badges/Twente.png'
    - name: 'Research Affiliate'
      url: 'https://www.uhasselt.be/en/instituten-en/biomed-en/immunology/biomedical-data-sciences'
      image: 'assets/images/badges/UHasselt.jpg'
  content_mobile: |
    AI Researcher in Healthcare - 🔍 `Self-Explaining AI` • 🤝 `Federated Learning` • 🧬 `Precision Medicine`

    Postdoctoral Researcher (Multi-Modal AI for Precision Medicine) @ University of Twente

    Research Affiliate (AI for Healthcare) @ Biomedical Data Sciences, UHasselt

    **Research Focus**: *The self-explaining hospital - interpretable, self-explaining models and federation that travels between institutions.*
      - Interpretable, self-explaining models (block-term / multiway) for clinical decisions
      - Federated learning that travels between hospitals - privacy-preserving, modality-incomplete
      - Multi-modal precision oncology: longitudinal MRI + omics + clinical for early cancer detection
      - Self-supervised backbones for longitudinal medical imaging
    
    **Professional Affiliations**:
      - University of Twente (Cognition, Data and Education section)
      - Biomedical Research Institute (BIOMED) @ UHasselt
      - Data Science Institute (DSI) @ UHasselt
        
      <a href="about">Would you like to know more? <i class="fas fa-angle-double-right"></i></a>
  content: |
    - AI Researcher in Healthcare - 🔍 `Self-Explaining AI` • 🤝 `Federated Learning` • 🧬 `Precision Medicine`
    - ***Research program:*** *The self-explaining hospital - interpretable, self-explaining models and privacy-preserving federation that travels between institutions, built on multiway (block-term tensor) methods.*
    - **Postdoctoral Researcher** (Multi-Modal AI for Precision Medicine) @ University of Twente (Cognition, Data and Education, CODE)
      - Developing `multi-modal federated AI` and explainable AI (XAI) that integrate longitudinal MRI, `multi-omics`, and clinical data for early hepatocellular carcinoma detection and risk prediction (AI-HCC ZonMw project).
      - Building `self-supervised backbones` and interpretable architectures that model temporal dynamics in longitudinal imaging and omics, working toward clinical translation in precision oncology.
    - **Research Affiliate** (AI for Healthcare) @ Biomedical Data Sciences, UHasselt
      - Leading cardiovascular disease prediction with `real-world evidence` and federated learning for privacy-preserving analysis (FAIR UC RWE, continuing as Research Affiliate).
      - Advancing `population health management` through federated learning for disease insight, risk prediction, and health equity.
      - Developing `brain-computer interfaces` for precision neuropsychiatry using tensor regression and deep learning.

    <a href="about">Would you like to know more? <i class="fas fa-angle-double-right"></i></a>
  # - **Scientific Coordinator** of the Flanders AI Research Program, Use Case Real World Evidence (FAIR UC RWE) - continuing in volunteer capacity
    # - **Professional Affiliations**:
    #   - Cognition, Data and Education (CODE) section @ University of Twente (from December 2025)
    #   - Biomedical Research Institute (BIOMED) @ UHasselt
    #   - Data Science Institute (DSI) @ UHasselt
  show_portrait: true
  portrait_url: assets/images/photos/axel.jpg
  portrait_height: 500
  portrait_caption: Building Knowledge, Driving Innovation
  research_mobile: |
    **Research**
      - Designing `self-explaining models` (block-term / multiway) that are interpretable by construction.
      - Building `federated learning` that travels between hospitals - privacy-preserving, modality-incomplete (FAIR UC RWE).
      - Advancing `multi-modal precision oncology` - longitudinal MRI, omics, and clinical data for early cancer detection.
      - Methodological roots in neural decoding and `brain-computer interfaces`, where my block-term tensor methods began.
  research: |
    **Vision for Research Impact** <a href="/research">(view more <i class="fas fa-angle-double-right"></i>)</a>
    I work toward **the self-explaining hospital**: clinical AI that explains its own reasoning and travels between institutions instead of demanding the data travel to it. I aim to:
    - **Make interpretability a guarantee**: designing self-explaining models - multiway, block-term - whose explanations are faithful by construction and stand up to clinical and regulatory scrutiny.
    - **Federate across real institutions**: using privacy-preserving federated learning to let hospitals - even those holding different modalities and incomplete data - train shared models without surrendering patient data.
    - **Advance multi-modal precision oncology**: integrating longitudinal imaging, omics, and clinical data for early cancer detection and personalized risk prediction, from retrospective benchmarks toward clinically embedded validation.
  
  biomed_url: assets/images/webpage/dls.webp
  biomed_caption: Innovating Computational Solutions for Real-World Health Challenges
  education_mobile: |
    **Education & Teaching**
      - Teaching Brain-Computer Interfaces, Federated Learning, Bioinformatics, and Data Science in Healthcare
      - Completed BKO (Basic Teaching Qualification) at UHasselt
      - Supervised 17+ Master's and PhD students across AI, Statistics & Data Science, Computer Science, and Biomedical Sciences
      - Experienced in interdisciplinary education and mentorship

  education: |
    **Vision for Educational Impact** <a href="/teaching">(view more <i class="fas fa-angle-double-right"></i>)</a>
    I want education in `AI for precision medicine` to bridge computational innovation with clinical application. I aim to:
    - **Mentor the next generation**: I have supervised 17+ Master's and doctoral students across AI, Statistics & Data Science, Computer Science, and Biomedical Sciences, fostering interdisciplinary thinking and technical rigour.
    - **Advance interdisciplinary education**: teaching Brain-Computer Interfaces, Federated Learning, Data Science in Healthcare, and Bioinformatics to equip students for real-world healthcare challenges.
    - **Develop accessible resources**: through open-source projects (BTTR toolkit, federated-learning tutorials) and teaching materials, I help make advanced AI methods accessible to life scientists and healthcare researchers.
    - **Build teaching excellence**: I completed my BKO (Basic Teaching Qualification) at UHasselt, reflecting a commitment to evidence-based teaching.

  mission_url: assets/images/webpage/biomed.webp
  mission_caption: Educating the Next Generation of Innovators

research:
  title: Research Diary
  content: |
    Welcome to my research corner, where I advance `AI for precision medicine`. Here, you'll find projects, insights, and innovations in `self-explaining models`, `federated learning`, and `interpretable AI` applied to real-world healthcare challenges - from hepatocellular carcinoma detection and cardiovascular risk prediction to the neural decoding where my block-term tensor methods began. Join me as I translate trustworthy AI methods into clinical impact.

