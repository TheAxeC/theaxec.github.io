{% assign m = site.data.website.metrics %}
<div class="row mt-3 main_view">
    <div class="col">
        <div class="card border-0 shadow-sm bg-white">
            <div class="card-body p-4 p-md-5">
                <div class="d-flex justify-content-between align-items-baseline flex-wrap mb-4">
                    <h2 class="mb-0">{{ m.title }}</h2>
                    {% if m.url %}
                    <a class="small text-muted" target="_blank" href="{{ m.url }}">{{ m.note }} <i class="fas fa-angle-double-right"></i></a>
                    {% else %}
                    <span class="small text-muted">{{ m.note }}</span>
                    {% endif %}
                </div>
                <div class="row text-center">
                    {% for stat in m.stats %}
                    <div class="col-6 col-md-3 mb-4 mb-md-0">
                        <div class="metric-stat">
                            <i class="{{ stat.icon }} mb-2" style="font-size: 1.5rem; color: #bd5d38;"></i>
                            <div class="metric-value" style="font-size: 2.5rem; font-weight: 700; line-height: 1; color: #bd5d38;">{{ stat.value }}</div>
                            <div class="metric-label small text-muted text-uppercase mt-1" style="letter-spacing: .05em;">{{ stat.label }}</div>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</div>
