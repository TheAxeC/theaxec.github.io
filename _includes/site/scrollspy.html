<script>
(function(){
  const nav=document.querySelector('.secnav');if(!nav)return;
  const links=Array.prototype.slice.call(nav.querySelectorAll('a'));
  const secs=links.map(function(a){return document.querySelector(a.getAttribute('href'));}).filter(Boolean);
  function onScroll(){var y=window.scrollY+140,idx=0;secs.forEach(function(s,i){if(s.offsetTop<=y)idx=i;});links.forEach(function(a,i){a.classList.toggle('active',i===idx);});}
  window.addEventListener('scroll',onScroll,{passive:true});window.addEventListener('resize',onScroll);onScroll();
})();
</script>
