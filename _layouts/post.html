<!DOCTYPE html>
<html lang="en">
<head>
{% include site/head.html %}
</head>
<body>
<div class="wrap">{% include site/nav.html %}</div>
<main class="wrap page post">
  <div class="post-meta">
    {% if page.category %}<span class="cat">{{ page.category }}</span>{% endif %}
    {% if page.date %}<span class="date">{{ page.date | date: "%B %-d, %Y" }}</span>{% endif %}
  </div>
  <h1 class="post-title">{{ page.title }}</h1>
  <article class="post-body">
    {{ content }}
  </article>
  <p style="margin-top:2.6rem"><a class="btn" href="{{ '/blog' | relative_url }}">&larr; All posts</a></p>
</main>
<div class="wrap">{% include site/footer.html %}</div>
</body>
</html>
