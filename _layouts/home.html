<script>
// ambient ECG signal
(function(){
  const svg=document.getElementById('ecg');if(!svg)return;
  const NS='http://www.w3.org/2000/svg';
  const path=document.createElementNS(NS,'path');path.setAttribute('fill','none');path.setAttribute('stroke-width','2');path.setAttribute('stroke-linejoin','round');path.setAttribute('stroke-linecap','round');svg.appendChild(path);
  const W=1120,MID=30,L=210;
  const bump=(d,c,w,h)=>h*Math.exp(-((d-c)*(d-c))/(2*w*w));
  function ecg(p){let y=0;y+=bump(p,0.30*L,7,5);if(p>0.40*L&&p<0.46*L)y-=4;if(p>=0.46*L&&p<0.49*L)y+=30*((p-0.46*L)/(0.03*L));if(p>=0.49*L&&p<0.53*L)y+=30-44*((p-0.49*L)/(0.04*L));if(p>=0.53*L&&p<0.57*L)y+=-14+14*((p-0.53*L)/(0.04*L));y+=bump(p,0.72*L,11,11);return y;}
  const still=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  let off=0;function frame(){let d='';for(let xx=0;xx<=W;xx+=2){const p=((xx+off)%L);const y=MID-ecg(p);d+=(xx===0?'M':'L')+xx+' '+y.toFixed(1)+' ';}path.setAttribute('d',d);}
  function draw(){off=(off+1.3)%L;frame();requestAnimationFrame(draw);}
  if(still){frame();}else{draw();}
})();
</script>
</body>
</html>
