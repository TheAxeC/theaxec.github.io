# -----------------------------------------------------------------------------
# Jekyll
# -----------------------------------------------------------------------------

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

collections:
  blog:
    output: true
    permalink: /blog/:path/
  linkedin:
    output: true
    permalink: /linkedin/:path/

include: ['_pages']

# Keep these out of the built site (GRANTS.md is a private reference, not a page).
# Note: setting `exclude` replaces Jekyll's defaults, so the usual entries are repeated here.
exclude:
  - GRANTS.md
  - run.sh
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - .sass-cache
  - .jekyll-cache
  - .bundle

plugins:
  - jekyll-sitemap